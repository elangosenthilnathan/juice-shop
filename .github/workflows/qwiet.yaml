---
# This workflow integrates ShiftLeft NG SAST with GitHub
# Visit https://docs.shiftleft.io for help
name: Qwiet Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  Qwiet-Static-Analysis:
    runs-on: ubuntu-latest
    container: shiftleft/core:latest

    steps:
    - uses: actions/checkout@v4

    - name: Run sl analyze 1
      shell: bash
      run: |
        npm install 
        cp ./node_modules/*package-lock.json package-lock.json
        cp package.json ./node_modules/package.json
        sl analyze --oss-project-dir ./node_modules --verbose --jssrc --app "${GITHUB_REPOSITORY#*/}" --analysis-timeout 60m --cpg-generation-timeout 60m . 
      env:
        SHIFTLEFT_ACCESS_TOKEN: ${{ secrets.SHIFTLEFT_ACCESS_TOKEN }}
