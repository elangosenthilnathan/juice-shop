---
# This workflow integrates ShiftLeft NG SAST with GitHub
# Visit https://docs.shiftleft.io for help
name: Qwiet Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  Qwiet-Static-Analysis:
    runs-on: ubuntu-latest
    container: shiftleft/core:latest

    steps:
    - uses: actions/checkout@v4

    - name: Run sl analyze 1
      shell: bash
      run: |
        sl analyze --oss-project-dir . --jssrc --verbose --app "${GITHUB_REPOSITORY#*/}" --analysis-timeout 60m --cpg-generation-timeout 60m . -- --package-json ./package.json
      env:
        SHIFTLEFT_ACCESS_TOKEN: ${{ secrets.SHIFTLEFT_ACCESS_TOKEN }}
